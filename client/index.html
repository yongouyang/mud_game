<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>炎黄群侠传 - Web MUD</title>
<style>
  *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: #0a0a0a;
    color: #33ff33;
    font-family: 'Consolas', 'Monaco', 'Courier New', 'Fira Code', monospace;
    font-size: 14px;
    line-height: 1.55;
    height: 100vh;
    display: flex;
    flex-direction: column;
    overflow: hidden;
  }

  .header {
    background: linear-gradient(135deg, #111 0%, #1a1a1a 100%);
    padding: 10px 16px;
    border-bottom: 1px solid #0f0;
    display: flex;
    align-items: center;
    justify-content: space-between;
    flex-shrink: 0;
  }

  .header h1 {
    color: #0f0;
    font-size: 15px;
    letter-spacing: 2px;
    text-shadow: 0 0 8px rgba(0,255,0,0.4);
  }

  .status-dot {
    display: inline-block;
    width: 8px; height: 8px;
    border-radius: 50%;
    background: #0f0;
    margin-right: 6px;
    box-shadow: 0 0 6px #0f0;
  }
  .status-dot.disconnected { background: #f33; box-shadow: 0 0 6px #f33; }
  .status-text { font-size: 11px; color: #888; }

  #output {
    flex: 1;
    overflow-y: auto;
    padding: 12px 16px;
    white-space: pre-wrap;
    word-break: break-all;
    scroll-behavior: smooth;
  }

  /* Scrollbar styling */
  #output::-webkit-scrollbar { width: 6px; }
  #output::-webkit-scrollbar-track { background: #111; }
  #output::-webkit-scrollbar-thumb { background: #333; border-radius: 3px; }
  #output::-webkit-scrollbar-thumb:hover { background: #0f0; }

  .input-bar {
    display: flex;
    align-items: center;
    gap: 6px;
    padding: 8px 16px;
    background: #111;
    border-top: 1px solid #333;
    flex-shrink: 0;
  }

  .prompt { color: #0f0; font-weight: bold; font-size: 14px; flex-shrink: 0; }

  #cmd-input {
    flex: 1;
    background: transparent;
    border: none;
    color: #33ff33;
    font-family: inherit;
    font-size: 14px;
    outline: none;
    caret-color: #0f0;
  }

  #cmd-input::placeholder { color: #444; }

  .btn-send {
    background: #1a1a1a;
    color: #0f0;
    border: 1px solid #0f0;
    padding: 4px 14px;
    font-family: inherit;
    font-size: 13px;
    cursor: pointer;
    flex-shrink: 0;
  }
  .btn-send:hover { background: #0f0; color: #000; }
</style>
</head>
<body>

<div class="header">
  <h1>炎黄群侠传</h1>
  <span class="status-text"><span class="status-dot" id="status-dot"></span><span id="status-label">连接中...</span></span>
</div>

<div id="output"></div>

<div class="input-bar">
  <span class="prompt">&gt;</span>
  <input type="text" id="cmd-input" placeholder="输入命令..." autofocus autocomplete="off">
  <button class="btn-send" id="btn-send">发送</button>
</div>

<script type="importmap">
{
  "imports": {
    "socket.io-client": "/socket.io/socket.io.esm.min.js"
  }
}
</script>
<script type="module">
import { io } from "socket.io-client";

const outputEl = document.getElementById('output');
const inputEl = document.getElementById('cmd-input');
const sendBtn = document.getElementById('btn-send');
const dotEl = document.getElementById('status-dot');
const labelEl = document.getElementById('status-label');

const socket = io();

socket.on('connect', () => {
  dotEl.classList.remove('disconnected');
  labelEl.textContent = '在线';
  appendText('\n  ╔════════════════════════════╗\n  ║    ★ 炎黄群侠传 ★        ║\n  ║    Web MUD Phase 1        ║\n  ╠════════════════════════════╣\n  ║  输入 help 查看可用命令    ║\n  ╚════════════════════════════╝\n');
});

socket.on('disconnect', () => {
  dotEl.classList.add('disconnected');
  labelEl.textContent = '断开';
});

socket.on('output', (data) => {
  if (data.text === '__CLEAR__') {
    outputEl.textContent = '';
    return;
  }
  appendText(data.text);
});

function appendText(text) {
  outputEl.textContent += text + '\n';
  outputEl.scrollTop = outputEl.scrollHeight;
}

function sendCommand() {
  const input = inputEl.value.trim();
  if (!input) return;

  // Echo command locally with prompt style
  outputEl.textContent += `\n  > ${input}\n`;
  outputEl.scrollTop = outputEl.scrollHeight;

  socket.emit('command', { input });
  inputEl.value = '';
}

sendBtn.addEventListener('click', sendCommand);
inputEl.addEventListener('keydown', (e) => {
  if (e.key === 'Enter') sendCommand();
});

// Focus input on click anywhere
document.addEventListener('click', () => inputEl.focus());
inputEl.focus();
</script>
</body>
</html>
